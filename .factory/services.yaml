commands:
  install: pnpm install
  typecheck: pnpm typecheck
  build: pnpm build
  test: pnpm test
  lint: echo "no lint configured"

services:
  backend:
    start: cd /home/shuv/repos/proxx && node --env-file-if-exists=.env --import tsx src/main.ts &
    stop: lsof -ti :8789 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:8789/health -H "Authorization:Bearer $(grep PROXY_AUTH_TOKEN /home/shuv/repos/proxx/.env | cut -d= -f2)"
    port: 8789
    depends_on: [postgres]

  web:
    start: cd /home/shuv/repos/proxx && pnpm web:dev &
    stop: lsof -ti :5174 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://127.0.0.1:5174
    port: 5174
    depends_on: [backend]

  postgres:
    start: docker start proxx-open-hax-openai-proxy-db-1
    stop: echo "do not stop postgres"
    healthcheck: pg_isready -h localhost -p 5432 -U openai_proxy
    port: 5432
    depends_on: []
