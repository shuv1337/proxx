app = 'open-hax-openai-proxy'
primary_region = 'lax'

[build]
  dockerfile = 'Dockerfile.fly'

[http_service]
  internal_port = 8789
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8789
  processes = ['app']

[[services.ports]]
  port = 8789
  handlers = ['http']

[[services.ports]]
  port = 443
  handlers = ['tls', 'http']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256'