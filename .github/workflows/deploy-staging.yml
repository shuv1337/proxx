name: deploy-staging

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: proxx-staging
  cancel-in-progress: true

jobs:
  staging-preflight:
    name: staging-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: go install github.com/rhysd/actionlint/cmd/actionlint@latest
      - run: chmod +x scripts/*.sh
      - run: ./scripts/ci-lint.sh
      - run: /home/runner/go/bin/actionlint
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm run web:build

  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - staging-preflight
    environment: staging
    steps:
      - uses: actions/checkout@v5
      - name: configure staging ssh
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host *\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "${STAGING_HOST}" >> ~/.ssh/known_hosts
        env:
          STAGING_HOST: ${{ vars.STAGING_SSH_HOST || 'ussy3.promethean.rest' }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      - run: chmod +x scripts/*.sh
      - name: deploy staging runtime
        run: ./scripts/deploy-remote.sh
        env:
          DEPLOY_HOST: ${{ vars.STAGING_SSH_HOST || 'ussy3.promethean.rest' }}
          DEPLOY_USER: ${{ vars.STAGING_SSH_USER || 'error' }}
          DEPLOY_PATH: ${{ vars.STAGING_DEPLOY_PATH || '~/devel/services/proxx-staging' }}
          DEPLOY_COMPOSE_PROJECT_NAME: ${{ vars.STAGING_COMPOSE_PROJECT_NAME || 'proxx-staging' }}
          DEPLOY_COMPOSE_FILES: docker-compose.federation-runtime.yml,deploy/docker-compose.federation.ssl.yml
          DEPLOY_CADDY_TEMPLATE: deploy/Caddyfile.federation.template
          DEPLOY_HEALTH_SERVICE: federation-nginx
          DEPLOY_RESTART_SERVICES: federation-proxx-a1,federation-proxx-a2,federation-nginx,open-hax-openai-proxy-ssl
          DEPLOY_PUBLIC_HOST: ${{ vars.STAGING_PUBLIC_HOST || 'ussy3.promethean.rest' }}
          DEPLOY_ENABLE_TLS: 'true'
          DEPLOY_HEALTH_TIMEOUT_SECONDS: '240'
          DEPLOY_SYNC_RUNTIME_FROM_SOURCE: 'true'
          DEPLOY_SYNC_DB_FROM_SOURCE: 'true'
          DEPLOY_ENV_APPEND: |
            FEDERATION_CLUSTER_ID=staging
            FEDERATION_PUBLIC_HOST_SUFFIX=${{ vars.STAGING_PUBLIC_HOST || 'ussy3.promethean.rest' }}
            FEDERATION_DEFAULT_OWNER_SUBJECT=did:web:${{ vars.STAGING_PUBLIC_HOST || 'ussy3.promethean.rest' }}
          DEPLOY_SOURCE_HOST: ${{ vars.STAGING_SOURCE_SSH_HOST || 'ussy.promethean.rest' }}
          DEPLOY_SOURCE_USER: ${{ vars.STAGING_SOURCE_SSH_USER || 'error' }}
          DEPLOY_SOURCE_PATH: ${{ vars.STAGING_SOURCE_DEPLOY_PATH || '~/devel/services/proxx' }}
          DEPLOY_SOURCE_COMPOSE_PROJECT_NAME: ${{ vars.STAGING_SOURCE_COMPOSE_PROJECT_NAME || 'open-hax-openai-proxy' }}
          DEPLOY_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
          DEPLOY_MODELS_JSON: ${{ secrets.STAGING_MODELS_JSON }}
      - name: staging deploy failure logs
        if: failure()
        run: |
          # shellcheck disable=SC2029,SC2086
          ssh ${STAGING_SSH_USER}@${STAGING_HOST} "cd ${STAGING_PATH} && docker compose --project-name '${STAGING_PROJECT}' -f docker-compose.federation-runtime.yml -f deploy/docker-compose.federation.ssl.yml ps && docker compose --project-name '${STAGING_PROJECT}' -f docker-compose.federation-runtime.yml -f deploy/docker-compose.federation.ssl.yml logs --tail=200"
        env:
          STAGING_HOST: ${{ vars.STAGING_SSH_HOST || 'ussy3.promethean.rest' }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER || 'error' }}
          STAGING_PATH: ${{ vars.STAGING_DEPLOY_PATH || '~/devel/services/proxx-staging' }}
          STAGING_PROJECT: ${{ vars.STAGING_COMPOSE_PROJECT_NAME || 'proxx-staging' }}

  staging-live-e2e:
    name: staging-live-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs:
      - deploy-staging
    environment: staging
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - name: configure staging ssh
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${STAGING_SSH_PRIVATE_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf 'Host *\n  IdentityFile ~/.ssh/deploy_key\n  IdentitiesOnly yes\n' > ~/.ssh/config
          chmod 600 ~/.ssh/config
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "${STAGING_HOST}" >> ~/.ssh/known_hosts
        env:
          STAGING_HOST: ${{ vars.STAGING_SSH_HOST || 'ussy3.promethean.rest' }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
      - run: chmod +x scripts/*.sh
      - run: |
          for attempt in $(seq 1 40); do
            echo "health-check attempt ${attempt}" >/dev/null
            if curl -fsS -H "Authorization: Bearer ${DEV_PROXY_AUTH_TOKEN}" "${DEV_PROXY_URL}/health" >/dev/null; then
              exit 0
            fi
            sleep 10
          done
          exit 1
        env:
          DEV_PROXY_URL: ${{ vars.STAGING_BASE_URL || 'https://ussy3.promethean.rest' }}
          DEV_PROXY_AUTH_TOKEN: ${{ secrets.STAGING_PROXY_AUTH_TOKEN }}
      - run: pnpm install --frozen-lockfile
      - id: live-e2e-core
        continue-on-error: true
        run: ./scripts/e2e-test.sh
        env:
          DEV_PROXY_URL: ${{ vars.STAGING_BASE_URL || 'https://ussy3.promethean.rest' }}
          DEV_PROXY_AUTH_TOKEN: ${{ secrets.STAGING_PROXY_AUTH_TOKEN }}
      - id: live-e2e-multitenancy
        continue-on-error: true
        run: ./scripts/e2e-multitenancy-smoke.sh
        env:
          DEV_PROXY_URL: ${{ vars.STAGING_BASE_URL || 'https://ussy3.promethean.rest' }}
          DEV_PROXY_AUTH_TOKEN: ${{ secrets.STAGING_PROXY_AUTH_TOKEN }}
      - id: live-e2e-federation
        continue-on-error: true
        run: ./scripts/e2e-federation-audit.sh
        env:
          FEDERATION_HOST_SUFFIX: ${{ vars.STAGING_PUBLIC_HOST || 'ussy3.promethean.rest' }}
          FEDERATION_AUTH_TOKEN: ${{ secrets.STAGING_PROXY_AUTH_TOKEN }}
          FEDERATION_SCHEME: https
          FEDERATION_RESOLVE_ADDRESS: ${{ vars.STAGING_VERIFY_RESOLVE_ADDRESS || vars.STAGING_SSH_HOST || '' }}
      - name: assert staging live e2e suite
        if: always()
        run: |
          core='${{ steps.live-e2e-core.outcome }}'
          multitenancy='${{ steps.live-e2e-multitenancy.outcome }}'
          federation='${{ steps.live-e2e-federation.outcome }}'

          echo "core=${core}"
          echo "multitenancy=${multitenancy}"
          echo "federation=${federation}"

          if [[ "$core" != "success" || "$multitenancy" != "success" || "$federation" != "success" ]]; then
            exit 1
          fi
      - name: staging live e2e failure logs
        if: failure()
        run: |
          # shellcheck disable=SC2029,SC2086
          ssh ${STAGING_SSH_USER}@${STAGING_HOST} "cd ${STAGING_PATH} && docker compose --project-name '${STAGING_PROJECT}' -f docker-compose.federation-runtime.yml -f deploy/docker-compose.federation.ssl.yml ps && docker compose --project-name '${STAGING_PROJECT}' -f docker-compose.federation-runtime.yml -f deploy/docker-compose.federation.ssl.yml logs --tail=200"
        env:
          STAGING_HOST: ${{ vars.STAGING_SSH_HOST || 'ussy3.promethean.rest' }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER || 'error' }}
          STAGING_PATH: ${{ vars.STAGING_DEPLOY_PATH || '~/devel/services/proxx-staging' }}
          STAGING_PROJECT: ${{ vars.STAGING_COMPOSE_PROJECT_NAME || 'proxx-staging' }}
