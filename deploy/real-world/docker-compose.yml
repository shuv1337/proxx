services:
  open-hax-openai-proxy:
    depends_on:
      open-hax-openai-proxy-db:
        condition: service_healthy
    image: proxx-realworld:latest
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PROXY_PORT:-3001}:8789"
      - "127.0.0.1:${PROXY_WEB_PORT:-5174}:5174"
      - "127.0.0.1:${OPENAI_OAUTH_CALLBACK_PORT:-1455}:8789"
    environment:
      NODE_ENV: production
      PROXY_HOST: 0.0.0.0
      PROXY_PORT: "8789"
      PORT: "8789"
      OPENAI_OAUTH_CALLBACK_PORT: "${OPENAI_OAUTH_CALLBACK_PORT:-1455}"
      PROXY_KEYS_FILE: /workspace/service-config/keys.json
      PROXY_MODELS_FILE: /workspace/service-config/models.json
      PROXY_REQUEST_LOGS_FILE: /app/data/request-logs.json
      DATABASE_URL: "${DATABASE_URL}"
      VITE_ALLOWED_HOSTS: "${VITE_ALLOWED_HOSTS:-}"
    volumes:
      - ./keys.json:/workspace/service-config/keys.json
      - ./models.json:/workspace/service-config/models.json:ro
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "Promise.all([fetch('http://127.0.0.1:'+String(process.env.PROXY_PORT || '3001')+'/health',{headers:{Authorization:'Bearer '+(process.env.PROXY_AUTH_TOKEN||'')}}), fetch('http://127.0.0.1:5174')]).then(([proxyResponse, webResponse]) => { if (!proxyResponse.ok || !webResponse.ok) { process.exit(1); } }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  open-hax-openai-proxy-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: openai_proxy
      POSTGRES_USER: openai_proxy
      POSTGRES_PASSWORD: openai_proxy
    ports:
      - "127.0.0.1:${PROXY_DB_PORT:-5433}:5432"
    volumes:
      - open-hax-openai-proxy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openai_proxy -d openai_proxy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  open-hax-openai-proxy-db-data:
