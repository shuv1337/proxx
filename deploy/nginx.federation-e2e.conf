worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream federation_cluster_all {
    server federation-proxx-a1:8789;
    server federation-proxx-a2:8789;
    server federation-proxx-b1:8789;
    server federation-proxx-b2:8789;
  }

  upstream federation_group_a {
    server federation-proxx-a1:8789;
    server federation-proxx-a2:8789;
  }

  upstream federation_group_b {
    server federation-proxx-b1:8789;
    server federation-proxx-b2:8789;
  }

  upstream federation_node_a1 {
    server federation-proxx-a1:8789;
  }

  upstream federation_node_a2 {
    server federation-proxx-a2:8789;
  }

  upstream federation_node_b1 {
    server federation-proxx-b1:8789;
  }

  upstream federation_node_b2 {
    server federation-proxx-b2:8789;
  }

  map $http_host $federation_upstream {
    default federation_cluster_all;
    cluster.federation.test federation_cluster_all;
    group-a.federation.test federation_group_a;
    group-b.federation.test federation_group_b;
    a1.federation.test federation_node_a1;
    a2.federation.test federation_node_a2;
    b1.federation.test federation_node_b1;
    b2.federation.test federation_node_b2;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://$federation_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
    }
  }
}
