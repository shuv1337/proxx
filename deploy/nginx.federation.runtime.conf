worker_processes auto;

events {
  worker_connections 1024;
}

http {
  upstream federation_cluster_api {
    # Keep the public/default cluster path on Group A, which inherits the
    # source environment state. Group B stays available via explicit hostnames
    # for federation inspection without taking default production traffic.
    server federation-proxx-a1:8789;
    server federation-proxx-a2:8789;
  }

  upstream federation_group_a_api {
    server federation-proxx-a1:8789;
    server federation-proxx-a2:8789;
  }

  upstream federation_group_b_api {
    server federation-proxx-b1:8789;
    server federation-proxx-b2:8789;
  }

  upstream federation_node_a1_api { server federation-proxx-a1:8789; }
  upstream federation_node_a2_api { server federation-proxx-a2:8789; }
  upstream federation_node_b1_api { server federation-proxx-b1:8789; }
  upstream federation_node_b2_api { server federation-proxx-b2:8789; }

  upstream federation_cluster_web {
    server federation-proxx-a1:5174;
    server federation-proxx-a2:5174;
  }

  upstream federation_group_a_web {
    server federation-proxx-a1:5174;
    server federation-proxx-a2:5174;
  }

  upstream federation_group_b_web {
    server federation-proxx-b1:5174;
    server federation-proxx-b2:5174;
  }

  upstream federation_node_a1_web { server federation-proxx-a1:5174; }
  upstream federation_node_a2_web { server federation-proxx-a2:5174; }
  upstream federation_node_b1_web { server federation-proxx-b1:5174; }
  upstream federation_node_b2_web { server federation-proxx-b2:5174; }

  map $http_host $federation_api_upstream {
    default federation_cluster_api;
    ~^group-a\. federation_group_a_api;
    ~^group-b\. federation_group_b_api;
    ~^a1\. federation_node_a1_api;
    ~^a2\. federation_node_a2_api;
    ~^b1\. federation_node_b1_api;
    ~^b2\. federation_node_b2_api;
  }

  map $http_host $federation_web_upstream {
    default federation_cluster_web;
    ~^group-a\. federation_group_a_web;
    ~^group-b\. federation_group_b_web;
    ~^a1\. federation_node_a1_web;
    ~^a2\. federation_node_a2_web;
    ~^b1\. federation_node_b1_web;
    ~^b2\. federation_node_b2_web;
  }

  server {
    listen 80;
    server_name _;

    location ~ ^/(v1|api|auth|health) {
      proxy_pass http://$federation_api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
    }

    location / {
      proxy_pass http://$federation_web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection "";
    }
  }
}
