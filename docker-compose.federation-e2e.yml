x-proxx-node: &proxx-node
  build:
    context: .
    dockerfile: Dockerfile
  environment: &proxx-node-env
    NODE_ENV: production
    PROXY_HOST: 0.0.0.0
    PROXY_PORT: "8789"
    PORT: "8789"
    PROXY_AUTH_TOKEN: "${FEDERATION_E2E_ADMIN_TOKEN:-federation-e2e-admin-token}"
    PROXY_KEYS_FILE: /workspace/service-config/keys.json
    PROXY_MODELS_FILE: /workspace/service-config/models.json
    PROXY_REQUEST_LOGS_FILE: /app/data/request-logs.jsonl
    PROXY_REQUEST_LOGS_MAX_ENTRIES: "100000"
    PROXY_REQUEST_LOGS_FLUSH_MS: "250"
    PROXY_PROMPT_AFFINITY_FLUSH_MS: "250"
    UPSTREAM_PROVIDER_ID: "openai"
    UPSTREAM_FALLBACK_PROVIDER_IDS: ""
    DISABLED_PROVIDER_IDS: ""
    OPENAI_PROVIDER_ID: "openai"
    OPENAI_BASE_URL: "http://federation-mock-openai:8080"
    OPENAI_API_BASE_URL: "http://federation-mock-openai:8080"
    OPENAI_IMAGES_UPSTREAM_MODE: "auto"
    OPENAI_OAUTH_CLIENT_ID: "app_EMoamEEZ73f0CkXaXp7hrann"
    OPENAI_OAUTH_ISSUER: "http://federation-mock-openai:8080"
    OPENAI_OAUTH_SCOPES: "openid profile email offline_access"
    OLLAMA_BASE_URL: "http://127.0.0.1:11434"
    UPSTREAM_CHAT_COMPLETIONS_PATH: "/v1/chat/completions"
    OPENAI_CHAT_COMPLETIONS_PATH: "/codex/responses/compact"
    UPSTREAM_MESSAGES_PATH: "/v1/messages"
    UPSTREAM_MESSAGES_MODEL_PREFIXES: "claude-"
    UPSTREAM_MESSAGES_INTERLEAVED_THINKING_BETA: "interleaved-thinking-2025-05-14"
    UPSTREAM_RESPONSES_PATH: "/v1/responses"
    OPENAI_RESPONSES_PATH: "/codex/responses"
    UPSTREAM_RESPONSES_MODEL_PREFIXES: "gpt-"
    OPENAI_MODEL_PREFIXES: "openai/,openai:"
    OLLAMA_CHAT_PATH: "/api/chat"
    OLLAMA_MODEL_PREFIXES: "ollama/,ollama:"
    PROXY_KEY_RELOAD_MS: "1000"
    PROXY_KEY_COOLDOWN_MS: "1000"
    UPSTREAM_REQUEST_TIMEOUT_MS: "15000"
    PROXY_ALLOW_UNAUTHENTICATED: "false"
    SESSION_SECRET: "${FEDERATION_E2E_SESSION_SECRET:-federation-e2e-session-secret}"
    VITE_ALLOWED_HOSTS: "cluster.federation.test,group-a.federation.test,group-b.federation.test,a1.federation.test,a2.federation.test,b1.federation.test,b2.federation.test,localhost,127.0.0.1"
    FEDERATION_REQUEST_TIMEOUT_MS: "5000"
    FEDERATION_SELF_CLUSTER_ID: "federation-e2e"
    FEDERATION_DEFAULT_OWNER_SUBJECT: "did:web:cluster.federation.test"
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD",
        "node",
        "-e",
        "fetch('http://127.0.0.1:8789/health',{headers:{Authorization:'Bearer '+(process.env.PROXY_AUTH_TOKEN||'')}}).then((response)=>{if(!response.ok){process.exit(1)}}).catch(()=>process.exit(1))"
      ]
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s
  networks:
    - federation-e2e

services:
  federation-mock-openai:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: ["node", "./scripts/mock-openai-federation-server.mjs"]
    environment:
      MOCK_OPENAI_PORT: "8080"
    ports:
      - "127.0.0.1:19090:8080"
    volumes:
      - ./:/workspace:ro
    networks:
      - federation-e2e

  federation-a-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: openai_proxy
      POSTGRES_USER: openai_proxy
      POSTGRES_PASSWORD: openai_proxy
    volumes:
      - federation-a-db-data:/var/lib/postgresql/data
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/db-a-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openai_proxy -d openai_proxy"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - federation-e2e

  federation-b-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: openai_proxy
      POSTGRES_USER: openai_proxy
      POSTGRES_PASSWORD: openai_proxy
    volumes:
      - federation-b-db-data:/var/lib/postgresql/data
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/db-b-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openai_proxy -d openai_proxy"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - federation-e2e

  federation-proxx-a1:
    <<: *proxx-node
    depends_on:
      federation-a-db:
        condition: service_healthy
    environment:
      <<: *proxx-node-env
      DATABASE_URL: postgresql://openai_proxy:openai_proxy@federation-a-db:5432/openai_proxy
      FEDERATION_SELF_NODE_ID: a1
      FEDERATION_SELF_GROUP_ID: group-a
      FEDERATION_SELF_PEER_DID: did:web:a1.federation.test
      FEDERATION_SELF_PUBLIC_BASE_URL: http://a1.federation.test
    ports:
      - "127.0.0.1:18891:8789"
    volumes:
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a1/keys.json:/workspace/service-config/keys.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a1/models.json:/workspace/service-config/models.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a1/data:/app/data

  federation-proxx-a2:
    <<: *proxx-node
    depends_on:
      federation-a-db:
        condition: service_healthy
    environment:
      <<: *proxx-node-env
      DATABASE_URL: postgresql://openai_proxy:openai_proxy@federation-a-db:5432/openai_proxy
      FEDERATION_SELF_NODE_ID: a2
      FEDERATION_SELF_GROUP_ID: group-a
      FEDERATION_SELF_PEER_DID: did:web:a2.federation.test
      FEDERATION_SELF_PUBLIC_BASE_URL: http://a2.federation.test
    ports:
      - "127.0.0.1:18892:8789"
    volumes:
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a2/keys.json:/workspace/service-config/keys.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a2/models.json:/workspace/service-config/models.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/a2/data:/app/data

  federation-proxx-b1:
    <<: *proxx-node
    depends_on:
      federation-b-db:
        condition: service_healthy
    environment:
      <<: *proxx-node-env
      DATABASE_URL: postgresql://openai_proxy:openai_proxy@federation-b-db:5432/openai_proxy
      FEDERATION_SELF_NODE_ID: b1
      FEDERATION_SELF_GROUP_ID: group-b
      FEDERATION_SELF_PEER_DID: did:web:b1.federation.test
      FEDERATION_SELF_PUBLIC_BASE_URL: http://b1.federation.test
    ports:
      - "127.0.0.1:18893:8789"
    volumes:
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b1/keys.json:/workspace/service-config/keys.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b1/models.json:/workspace/service-config/models.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b1/data:/app/data

  federation-proxx-b2:
    <<: *proxx-node
    depends_on:
      federation-b-db:
        condition: service_healthy
    environment:
      <<: *proxx-node-env
      DATABASE_URL: postgresql://openai_proxy:openai_proxy@federation-b-db:5432/openai_proxy
      FEDERATION_SELF_NODE_ID: b2
      FEDERATION_SELF_GROUP_ID: group-b
      FEDERATION_SELF_PEER_DID: did:web:b2.federation.test
      FEDERATION_SELF_PUBLIC_BASE_URL: http://b2.federation.test
    ports:
      - "127.0.0.1:18894:8789"
    volumes:
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b2/keys.json:/workspace/service-config/keys.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b2/models.json:/workspace/service-config/models.json:ro
      - ${FEDERATION_E2E_RUNTIME_DIR:?set-runtime-dir}/b2/data:/app/data

  federation-nginx:
    image: nginx:1.27-alpine
    depends_on:
      federation-proxx-a1:
        condition: service_healthy
      federation-proxx-a2:
        condition: service_healthy
      federation-proxx-b1:
        condition: service_healthy
      federation-proxx-b2:
        condition: service_healthy
    ports:
      - "127.0.0.1:18080:80"
    volumes:
      - ./deploy/nginx.federation-e2e.conf:/etc/nginx/nginx.conf:ro
    networks:
      - federation-e2e

networks:
  federation-e2e:
    driver: bridge

volumes:
  federation-a-db-data:
  federation-b-db-data:
